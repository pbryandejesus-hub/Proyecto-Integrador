<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background gradient - urban feel -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2b2825;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a4440;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4796d;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4886d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c54747;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#heroGrad)"/>
  
  <!-- Urban geometric shapes in background -->
  <rect x="0" y="0" width="250" height="250" fill="#c54747" opacity="0.15"/>
  <rect x="550" y="250" width="250" height="250" fill="#d4886d" opacity="0.15"/>
  <polygon points="400,0 500,150 300,150" fill="#d4c5a0" opacity="0.1"/>
  
  <!-- Figure -->
  <circle cx="400" cy="120" r="65" fill="#2b2825" opacity="0.8"/>
  
  <!-- T-shirt - main look -->
  <path d="M 300 185 Q 295 210 295 280 L 505 280 Q 505 210 500 185 Z" fill="url(#shirtGrad)" stroke="#9b3a3b" stroke-width="3"/>
  
  <!-- Sleeves -->
  <ellipse cx="250" cy="210" rx="50" ry="70" fill="url(#shirtGrad)" stroke="#9b3a3b" stroke-width="2" opacity="0.9"/>
  <ellipse cx="550" cy="210" rx="50" ry="70" fill="url(#shirtGrad)" stroke="#9b3a3b" stroke-width="2" opacity="0.9"/>
  
  <!-- Neckline detail -->
  <ellipse cx="400" cy="185" rx="65" ry="30" fill="url(#shirtGrad)" stroke="#9b3a3b" stroke-width="3"/>
  
  <!-- Graphic design on shirt -->
  <rect x="340" y="210" width="120" height="40" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" rx="5"/>
  <line x1="350" y1="220" x2="450" y2="220" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="350" y1="230" x2="450" y2="230" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Pants -->
  <path d="M 320 280 L 315 450 L 340 450 L 345 280 Z" fill="#3a3a38" stroke="#1a1a18" stroke-width="2"/>
  <path d="M 455 280 L 460 450 L 485 450 L 480 280 Z" fill="#3a3a38" stroke="#1a1a18" stroke-width="2"/>
  
  <!-- Shoes -->
  <ellipse cx="327" cy="460" rx="18" ry="12" fill="#1a1a18"/>
  <ellipse cx="472" cy="460" rx="18" ry="12" fill="#1a1a18"/>
  
  <!-- Text overlay -->
  <text x="50" y="350" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" opacity="0.95">MODA</text>
  <text x="50" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#d4886d" opacity="0.95">URBANA</text>
  
  <!-- Accent line -->
  <line x1="50" y1="440" x2="350" y2="440" stroke="#d4886d" stroke-width="4" opacity="0.8"/>
</svg>