<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7f2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede7dd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGrad3)"/>
  
  <!-- Torso -->
  <rect x="150" y="80" width="100" height="80" fill="#b8d4a8" stroke="#7a9d6f" stroke-width="2" rx="10"/>
  
  <!-- Left pant leg -->
  <path d="M 170 160 L 165 270 L 185 270 L 190 160 Z" fill="#5a7d4f" stroke="#4a6d3f" stroke-width="2"/>
  
  <!-- Right pant leg -->
  <path d="M 210 160 L 215 270 L 235 270 L 230 160 Z" fill="#5a7d4f" stroke="#4a6d3f" stroke-width="2"/>
  
  <!-- Waistband -->
  <ellipse cx="200" cy="160" rx="55" ry="15" fill="#4a6d3f" opacity="0.6"/>
  
  <!-- Belt -->
  <rect x="155" y="155" width="90" height="12" fill="#3a4d2f" stroke="#2a3d1f" stroke-width="1" rx="2"/>
  
  <!-- Details - seams -->
  <line x1="175" y1="160" x2="172" y2="270" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  <line x1="225" y1="160" x2="228" y2="270" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  
  <!-- Figure -->
  <circle cx="200" cy="50" r="20" fill="#2b2825" opacity="0.5"/>
  
  <!-- Shadow -->
  <ellipse cx="200" cy="280" rx="130" ry="10" fill="rgba(43,40,37,0.1)"/>
</svg>