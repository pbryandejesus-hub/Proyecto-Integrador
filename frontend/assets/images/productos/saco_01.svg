<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7f2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede7dd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGrad2)"/>
  
  <!-- Blazer jacket -->
  <path d="M 80 90 L 320 90 Q 330 95 330 110 L 330 260 Q 330 270 320 270 L 80 270 Q 70 270 70 260 L 70 110 Q 70 95 80 90 Z" fill="#1a3a52" stroke="#0d1f2d" stroke-width="2"/>
  
  <!-- Left lapel -->
  <polygon points="200,90 200,200 90,270 150,200" fill="#0d1f2d" opacity="0.3"/>
  
  <!-- Right lapel -->
  <polygon points="200,90 200,200 310,270 250,200" fill="#0d1f2d" opacity="0.3"/>
  
  <!-- Buttons -->
  <circle cx="200" cy="160" r="6" fill="#d4c5a0"/>
  <circle cx="200" cy="200" r="6" fill="#d4c5a0"/>
  <circle cx="200" cy="240" r="6" fill="#d4c5a0"/>
  
  <!-- Pocket details -->
  <rect x="95" y="180" width="30" height="40" fill="none" stroke="#0d1f2d" stroke-width="1" opacity="0.5"/>
  <rect x="275" y="180" width="30" height="40" fill="none" stroke="#0d1f2d" stroke-width="1" opacity="0.5"/>
  
  <!-- Shirt inside -->
  <path d="M 100 110 L 300 110 L 300 150 L 100 150 Z" fill="#f0e6d2" stroke="none"/>
  
  <!-- Figure -->
  <circle cx="200" cy="50" r="22" fill="#2b2825" opacity="0.6"/>
  
  <!-- Shadow -->
  <ellipse cx="200" cy="280" rx="140" ry="12" fill="rgba(43,40,37,0.12)"/>
</svg>