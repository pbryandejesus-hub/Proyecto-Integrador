<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7f2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede7dd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4886d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c54747;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGrad1)"/>
  
  <!-- T-shirt body - Terracota color -->
  <path d="M 100 80 Q 95 100 95 140 L 95 260 Q 95 270 105 270 L 295 270 Q 305 270 305 260 L 305 140 Q 305 100 300 80 Z" fill="url(#shirtGrad)" stroke="#c54747" stroke-width="2"/>
  
  <!-- T-shirt sleeves -->
  <ellipse cx="70" cy="100" rx="35" ry="55" fill="url(#shirtGrad)" stroke="#c54747" stroke-width="2"/>
  <ellipse cx="330" cy="100" rx="35" ry="55" fill="url(#shirtGrad)" stroke="#c54747" stroke-width="2"/>
  
  <!-- Neckline -->
  <ellipse cx="200" cy="80" rx="50" ry="25" fill="url(#shirtGrad)" stroke="#c54747" stroke-width="2"/>
  
  <!-- Design details - minimalist stripes -->
  <line x1="150" y1="130" x2="250" y2="130" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <line x1="140" y1="160" x2="260" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="135" y1="190" x2="265" y2="190" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  
  <!-- Figure silhouette hint -->
  <circle cx="200" cy="50" r="25" fill="#2b2825" opacity="0.7"/>
  
  <!-- Shadow -->
  <ellipse cx="200" cy="280" rx="140" ry="15" fill="rgba(43,40,37,0.1)"/>
</svg>